version: '3.8'

services:
  app:
    build: .
    container_name: photobooth-web
    ports:
      - "3330:3000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=photobooth_db
    volumes:
      - photo-uploads:/app/uploads
    networks:
      - cloudflare-bridge
      - default
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=photobooth_db
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  photo-uploads:
  db-data:

networks:
  cloudflare-bridge:
    external: true
